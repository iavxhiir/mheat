name: release

# Triggers on a semver tag push (e.g. v0.4.0). Builds the image with a
# semver tag, publishes to GHCR, attaches the reproducibility manifest,
# and (if ZENODO_TOKEN is configured) creates a Zenodo draft deposit so
# the release is DOI-citable.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write     # create GitHub release + upload assets
  packages: write     # push to GHCR
  id-token: write     # future-proofing (OIDC to external registries)

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for setuptools_scm-style version fallback

      - name: Derive version
        id: ver
        run: |
          # Strip the leading "v" from the tag — v0.4.0 -> 0.4.0.
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "MHEAT version: $VERSION"

      - name: Set up QEMU (cross-arch emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push multi-arch image (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Python (for reproduce.py)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: System deps (geospatial)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgeos-dev libproj-dev libspatialindex-dev

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Regenerate the reproducibility manifest
        env:
          DEMO_MODE: "true"
        run: python scripts/reproduce.py

      - name: Create GitHub Release + attach artefacts
        uses: softprops/action-gh-release@v3
        with:
          name: MHEAT ${{ steps.ver.outputs.version }}
          body: |
            Automated release for MHEAT `${{ steps.ver.outputs.version }}`.

            - Container: `ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}`
            - Reproducibility manifest: `out/manifest.sha256`
            - CHANGELOG: https://github.com/${{ github.repository }}/blob/v${{ steps.ver.outputs.version }}/CHANGELOG.md

            Built from commit ${{ github.sha }}.
          files: |
            out/manifest.sha256
            out/events.geojson
            out/events.csv
            out/stac_collections.json
            out/ogcapi_collections.json

      # Zenodo deposit — only if ZENODO_TOKEN is configured on the repo.
      - name: Zenodo deposit (draft)
        if: ${{ env.ZENODO_TOKEN != '' }}
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          META=$(jq -n \
            --arg ver "$VERSION" \
            --arg sha "$GITHUB_SHA" \
            --slurpfile meta .zenodo.json \
            '$meta[0] * {
               version: $ver,
               publication_date: (now | strftime("%Y-%m-%d")),
               notes: ("Built from commit " + $sha)
            }')
          DEPOSIT=$(curl -sSf \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -X POST "https://zenodo.org/api/deposit/depositions" \
            -d "$(jq -n --argjson m "$META" '{metadata: $m}')")
          BUCKET=$(echo "$DEPOSIT" | jq -r '.links.bucket')
          ID=$(echo "$DEPOSIT" | jq -r '.id')
          echo "Created Zenodo draft deposit $ID"

          for f in out/manifest.sha256 out/events.geojson out/events.csv; do
            [ -f "$f" ] || continue
            curl -sSf -H "Authorization: Bearer $ZENODO_TOKEN" \
              --upload-file "$f" "$BUCKET/$(basename $f)"
          done

          echo "Zenodo draft ready for manual review + publish:"
          echo "https://zenodo.org/deposit/$ID"
